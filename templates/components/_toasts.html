{% load i18n %}

{% if messages %}
  <div aria-live="polite" aria-atomic="true"
    class="toast-container position-fixed bottom-0 start-50 translate-middle-x mb-4"
    style="z-index: 1100;">
    {% for message in messages %}
      <div
        class="toast alert align-items-center
          {% if message.tags == 'success' %} toast-soft-success
          {% elif message.tags == 'warning' %} toast-soft-warning
          {% elif message.tags == 'error' %} toast-soft-danger
          {% endif %}"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
        data-bs-autohide="true"
        {% if message.tags == 'debug' %} data-bs-delay="15000"
        {% elif message.tags == 'success' %} data-bs-delay="3000"
        {% elif message.tags == 'warning' %} data-bs-delay="8000"
        {% elif message.tags == 'error' %} data-bs-delay="15000"
        {% else %} data-bs-delay="5000" {% endif %}>
        <div class="d-flex">
          <div class="toast-body">
            {{ message }}
          </div>
          <button type="button"
                  class="btn-close me-2 m-auto"
                  data-bs-dismiss="toast"
                  aria-label="{% trans 'Close' %}"></button>
        </div>
      </div>
    {% endfor %}
  </div>
{% endif %}
