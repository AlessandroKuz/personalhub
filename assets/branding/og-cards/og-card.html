<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>OG Card – Alessandro Kuz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300;1,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-bg:     #141414;
      --color-text:   #e8e6e1;
      --color-muted:  #777;
      --color-border: #242424;
      --accent:       #275DAD;
      --green:        #4ade80;
      --font-sans:    'DM Sans', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-sans);
    }

    .card {
      width: 1200px;
      height: 630px;
      padding: 72px 100px 64px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--color-border) 1px, transparent 1px),
        linear-gradient(90deg, var(--color-border) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.35;
      pointer-events: none;
    }

    .glow {
      position: absolute;
      top: -220px;
      left: -140px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(39,93,173,0.13) 0%, transparent 68%);
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 110% 50%, rgba(0,0,0,0.45) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Top content ── */
    .top {
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* Eyebrow — full brightness, larger, two roles split by accent dot */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-bottom: 1.75rem;
    }
    .eyebrow-line {
      width: 30px;
      height: 2.5px;
      background: var(--accent);
      flex-shrink: 0;
    }
    .eyebrow-text {
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 2.10rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .eyebrow-sep {
      color: var(--accent);
      font-size: 2.5rem;
      line-height: 1;
      opacity: 0.9;
    }
    .eyebrow-role {
      color: var(--color-text);
    }

    .hero-name {
      font-size: 8.4rem;
      font-weight: 700;
      line-height: 0.94;
      letter-spacing: -0.04em;
      white-space: nowrap;
      margin-bottom: 1.5rem;
    }
    .hero-name .accent {
      color: var(--accent);
    }

    .tagline {
      font-size: 2rem;
      font-style: italic;
      font-weight: 300;
      color: var(--color-muted);
      letter-spacing: 0.01em;
      margin-bottom: 1.25rem;
    }

    .desc {
      font-size: 1.8rem;
      color: var(--color-muted);
      line-height: 1.85;
      max-width: 1200px;
      font-weight: 300;
    }

    /* ── Bottom bar ── */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      font-size: 1rem;
      padding-top: 1.5rem;
      border-top: 3px solid var(--color-border);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-family: var(--font-mono);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-muted);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 7px var(--green);
      flex-shrink: 0;
    }

    .domain {
      font-family: var(--font-mono);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-muted);
      opacity: 0.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="vignette"></div>

    <div class="top">
      <div class="eyebrow">
        <span class="eyebrow-line"></span>
        <span class="eyebrow-text">
          <span class="eyebrow-role">Data Scientist</span>
          <span class="eyebrow-sep">/</span>
          <span class="eyebrow-role">AI/ML Engineer</span>
        </span>
      </div>
      <h1 class="hero-name">Alessandro <span class="accent">Kuz</span></h1>
      <p class="tagline">Built Lean.&nbsp;&nbsp;Shipped Clean.</p>
      <p class="desc">
        End-to-end data products: from pipelines and models to the
        interfaces people actually use. Based in Italy, working globally.
      </p>
    </div>

    <div class="bottom">
      <div class="status-row">
        <span class="status-dot"></span>
        Open to work
      </div>
      <p class="domain">alessandrokuz.com</p>
    </div>
  </div>
</body>
</html>
