<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background-color: #141414;
    color: #e8e6e1;
    font-family: 'DM Mono', monospace;
  }

  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 80px 100px;
    overflow: hidden;
  }

  /* ── Subtle grid texture ── */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* ── Accent glow — top left ── */
  .card::after {
    content: "";
    position: absolute;
    top: -200px;
    left: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(39, 93, 173, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Left accent bar ── */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      #275DAD 30%,
      #275DAD 70%,
      transparent 100%
    );
  }

  /* ── Content ── */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 300;
    color: #275DAD;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .name {
    font-family: 'DM Mono', monospace;
    font-size: 86px;
    font-weight: 400;
    line-height: 1;
    color: #e8e6e1;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }

  .name strong {
    font-style: bold;
    color: #275DAD;
  }

  .title {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    color: #888;
    letter-spacing: 0.05em;
  }

  /* ── URL — bottom right ── */
  .url {
    position: absolute;
    bottom: 52px;
    right: 100px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 300;
    color: #2a2a2a;
    letter-spacing: 0.12em;
    z-index: 1;
    border: 1px solid #2a2a2a;
    padding: 8px 16px;
    border-radius: 4px;
  }

  /* ── Bottom rule ── */
  .bottom-rule {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(
      to right,
      #275DAD 0%,
      #1e1e1e 40%,
      transparent 100%
    );
  }
</style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>

    <div class="content">
      <span class="tagline">From data to deployment.</span>
      <h1 class="name">Alessandro <strong>Kuz</strong></h1>
      <p class="title">AI/ML Engineer &amp; Builder</p>
    </div>

    <div class="url">alessandrokuz.com</div>
    <div class="bottom-rule"></div>
  </div>
</body>
</html>
