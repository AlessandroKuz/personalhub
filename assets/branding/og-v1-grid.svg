<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="rgba(240,240,240,0.09)"/>
    </pattern>
    <!-- Edge vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="62%" fx="50%" fy="50%">
      <stop offset="38%" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.88"/>
    </radialGradient>
  </defs>

  <!-- Ground -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Hairline rule above name -->
  <line x1="96" y1="218" x2="1104" y2="218" stroke="rgba(240,240,240,0.08)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="190"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="17" font-weight="300"
    fill="rgba(240,240,240,0.42)"
    text-anchor="middle"
    letter-spacing="4">FROM DATA TO DEPLOYMENT.</text>

  <!-- Name: Alessandro -->
  <text x="565" y="340"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="96" font-weight="300"
    fill="#f0f0f0"
    text-anchor="end"
    letter-spacing="-1">Alessandro</text>

  <!-- Name: Kuz (bold, blue) -->
  <text x="580" y="340"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="96" font-weight="700"
    fill="#275DAD"
    text-anchor="start"
    letter-spacing="-1">Kuz</text>

  <!-- Hairline rule below name -->
  <line x1="96" y1="370" x2="1104" y2="370" stroke="rgba(240,240,240,0.08)" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="600" y="408"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="18" font-weight="300"
    fill="rgba(240,240,240,0.42)"
    text-anchor="middle"
    letter-spacing="5">AI / ML ENGINEER &amp; BUILDER</text>

  <!-- URL bottom-center -->
  <text x="576" y="584"
    font-family="'Courier New',monospace"
    font-size="13" font-weight="400"
    fill="rgba(240,240,240,0.22)"
    text-anchor="middle"
    letter-spacing="2">alessandrokuz.com</text>

  <!-- K favicon mark — bottom right -->
  <rect x="1104" y="554" width="48" height="48" rx="0" fill="#111111"/>
  <text x="1128" y="589"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="34" font-weight="500"
    fill="#f0f0f0"
    text-anchor="middle">K</text>
  <line x1="1110" y1="599" x2="1146" y2="599" stroke="#f0f0f0" stroke-width="0.7" opacity="0.5"/>
</svg>
