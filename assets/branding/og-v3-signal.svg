<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Radial blue emanation -->
    <radialGradient id="glow3" cx="50%" cy="54%" r="45%">
      <stop offset="0%"   stop-color="#275DAD" stop-opacity="0.13"/>
      <stop offset="55%"  stop-color="#275DAD" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#275DAD" stop-opacity="0"/>
    </radialGradient>
    <!-- Divider line gradients -->
    <linearGradient id="divTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(39,93,173,0)"/>
      <stop offset="25%"  stop-color="rgba(39,93,173,0.35)"/>
      <stop offset="50%"  stop-color="rgba(39,93,173,0.45)"/>
      <stop offset="75%"  stop-color="rgba(39,93,173,0.35)"/>
      <stop offset="100%" stop-color="rgba(39,93,173,0)"/>
    </linearGradient>
    <linearGradient id="divBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(240,240,240,0)"/>
      <stop offset="25%"  stop-color="rgba(240,240,240,0.07)"/>
      <stop offset="50%"  stop-color="rgba(240,240,240,0.1)"/>
      <stop offset="75%"  stop-color="rgba(240,240,240,0.07)"/>
      <stop offset="100%" stop-color="rgba(240,240,240,0)"/>
    </linearGradient>
  </defs>

  <!-- Ground -->
  <rect width="1200" height="630" fill="#080a0e"/>

  <!-- Ghost K watermark -->
  <text x="600" y="500"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="680" font-weight="700"
    fill="none"
    stroke="rgba(39,93,173,0.055)"
    stroke-width="1"
    text-anchor="middle"
    letter-spacing="-0.05em">K</text>

  <!-- Radial emanation -->
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Outer frame -->
  <rect x="24" y="24" width="1152" height="582"
    fill="none"
    stroke="rgba(39,93,173,0.13)"
    stroke-width="1"/>

  <!-- Divider lines -->
  <line x1="96" y1="226" x2="1104" y2="226" stroke="url(#divTop)" stroke-width="1"/>
  <line x1="96" y1="375" x2="1104" y2="375" stroke="url(#divBot)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="196"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="17" font-weight="300"
    fill="rgba(240,240,240,0.36)"
    text-anchor="middle"
    letter-spacing="5">FROM DATA TO DEPLOYMENT.</text>

  <!-- Name -->
  <text x="565" y="346"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="102" font-weight="300"
    fill="#f0f0f0"
    text-anchor="end"
    letter-spacing="-1">Alessandro</text>

  <text x="582" y="346"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="102" font-weight="700"
    fill="#275DAD"
    text-anchor="start"
    letter-spacing="-1">Kuz</text>

  <!-- Subtitle -->
  <text x="600" y="416"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="18" font-weight="300"
    fill="rgba(240,240,240,0.36)"
    text-anchor="middle"
    letter-spacing="6">AI / ML ENGINEER &amp; BUILDER</text>

  <!-- URL -->
  <text x="576" y="584"
    font-family="'Courier New',monospace"
    font-size="13"
    fill="rgba(240,240,240,0.18)"
    text-anchor="middle"
    letter-spacing="2">alessandrokuz.com</text>

  <!-- K mark -->
  <rect x="1104" y="554" width="48" height="48" fill="#0d0f14"/>
  <text x="1128" y="589"
    font-family="'Jost','Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="34" font-weight="500"
    fill="#f0f0f0"
    text-anchor="middle">K</text>
  <line x1="1110" y1="599" x2="1146" y2="599" stroke="#275DAD" stroke-width="0.9" opacity="0.8"/>
</svg>
