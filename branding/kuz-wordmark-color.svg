<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@500&amp;display=swap');
    </style>
  </defs>

  <!-- Ground -->
  <rect width="800" height="220" fill="#0a0a0a"/>

  <!-- KUZ — identical geometry to mono version -->
  <text
    x="400"
    y="130"
    font-family="'Jost', 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif"
    font-size="88"
    font-weight="500"
    fill="#f0f0f0"
    text-anchor="middle"
    letter-spacing="28"
    textLength="340"
    lengthAdjust="spacing"
  >KUZ</text>

  <!-- Accent rule — icy blue, same geometry, heavier weight to carry the colour -->
  <line
    x1="230" y1="152"
    x2="570" y2="152"
    stroke="#38bdf8"
    stroke-width="1.2"
  />
</svg>
